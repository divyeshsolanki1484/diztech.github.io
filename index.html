<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopware QA Reports</title>
<style>
  :root { --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --muted: #94a3b8; --border: #334155; --accent: #3b82f6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 1000px; margin: 0 auto; padding: 3rem 2rem; }

  /* Header */
  .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
  .logo { width: 56px; height: 56px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 32px; height: 32px; fill: white; }
  .header h1 { font-size: 1.75rem; font-weight: 700; }
  .header h1 span { color: var(--muted); font-weight: 400; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2.5rem; padding-left: 72px; }
  .subtitle a { color: var(--accent); text-decoration: none; }
  .subtitle a:hover { text-decoration: underline; }

  /* Table */
  .report-table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .report-table thead th {
    padding: 1rem 1.25rem;
    text-align: left;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: rgba(30,41,59,0.8);
  }
  .report-table tbody td {
    padding: 1.1rem 1.25rem;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .report-table tbody tr:last-child td { border-bottom: none; }
  .report-table tbody tr:hover { background: rgba(59,130,246,0.04); }

  .ext-name { font-weight: 600; color: #f1f5f9; }
  .type-badge { color: var(--muted); }
  .date { color: var(--muted); }
  .score { font-weight: 600; }

  /* Grade badges */
  .grade {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 32px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 0.85rem;
    color: white;
  }
  .grade-a  { background: #22c55e; }
  .grade-a- { background: #4ade80; }
  .grade-b  { background: #3b82f6; }
  .grade-b- { background: #60a5fa; }
  .grade-c  { background: #f59e0b; }
  .grade-d  { background: #ef4444; }
  .grade-f  { background: #dc2626; }

  .view-link { color: var(--accent); text-decoration: none; font-weight: 500; font-size: 0.9rem; }
  .view-link:hover { text-decoration: underline; }

  /* Footer */
  .footer { text-align: center; margin-top: 3rem; color: var(--muted); font-size: 0.8rem; }

  /* Responsive */
  @media (max-width: 640px) {
    .container { padding: 1.5rem 1rem; }
    .header h1 { font-size: 1.3rem; }
    .subtitle { padding-left: 0; }
    .report-table thead th, .report-table tbody td { padding: 0.75rem 0.6rem; font-size: 0.8rem; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm10 0h2v2h2v2h-2v2h-2v-2h-2v-2h2v-2zm4-2h2v2h-2v-2zm0 4h2v4h-4v-2h2v-2z"/>
      </svg>
    </div>
    <h1><span>&mdash;</span> Shopware QA Reports</h1>
  </div>
  <div class="subtitle">Quality audits for all Shopware 6 extensions &mdash; <a href="https://diztech.github.io">diztech.github.io</a></div>

  <table class="report-table">
    <thead>
      <tr>
        <th>Extension</th>
        <th>Type</th>
        <th>Date</th>
        <th>Score</th>
        <th>Grade</th>
        <th>Report</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="ext-name">ZeobvAbandonedCart</td>
        <td class="type-badge">Plugin</td>
        <td class="date">2026-04-06</td>
        <td class="score">89/100</td>
        <td><span class="grade grade-b">B+</span></td>
        <td><a class="view-link" href="audit-report.html">View report</a></td>
      </tr>
    </tbody>
  </table>

  <div class="footer">Generated by Diztech QA Audit</div>

</div>
</body>
</html>
